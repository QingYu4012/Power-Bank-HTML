<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Serial 串口调试助手</title>
  <style>
    :root {
      --bg-1: #f4f7ff;
      --bg-2: #eefaf6;
      --bg-3: #fff8ec;
      --card: #ffffff;
      --line: #d8deea;
      --text: #172033;
      --text-soft: #4d5b7a;
      --primary: #1d6ef2;
      --primary-strong: #1153c6;
      --danger: #c6283d;
      --warn: #dd8a00;
      --ok: #0c8853;
      --log-bg: #101729;
      --log-line: #1f2a44;
      --shadow: 0 10px 30px rgba(21, 36, 75, 0.12);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: "Source Sans 3", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(90rem 55rem at -10% -20%, #cfe0ff 0%, transparent 60%),
        radial-gradient(80rem 40rem at 120% 10%, #d4f3e4 0%, transparent 58%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2) 48%, var(--bg-3));
      min-height: 100vh;
    }

    .shell {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .hero {
      background: linear-gradient(120deg, #172c61, #0a7958);
      color: #f4f8ff;
      border-radius: var(--radius);
      padding: 18px 20px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .hero h1 {
      margin: 0;
      font-size: 1.52rem;
      letter-spacing: 0.02em;
    }

    .hero p {
      margin: 6px 0 0;
      color: #d7e8ff;
      font-size: 0.97rem;
    }

    .banner {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 0.92rem;
      line-height: 1.4;
      background: rgba(255, 212, 125, 0.16);
      border: 1px solid rgba(255, 212, 125, 0.5);
      color: #fff7d8;
      display: none;
    }

    .layout {
      display: grid;
      grid-template-columns: 390px 1fr;
      gap: 16px;
    }

    .panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid rgba(145, 164, 205, 0.35);
      box-shadow: var(--shadow);
      padding: 14px 14px 12px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 1.03rem;
      color: #1a2d56;
      letter-spacing: 0.01em;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .state-pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      font-size: 0.8rem;
      padding: 4px 10px;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .state-pill.disconnected {
      background: #eef1fa;
      border-color: #d6def0;
      color: #516182;
    }

    .state-pill.connected {
      background: #e7f8f1;
      border-color: #bde8d4;
      color: #15754c;
    }

    .state-pill.error {
      background: #ffeff2;
      border-color: #ffccd4;
      color: #aa2036;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 8px;
    }

    label {
      font-size: 0.87rem;
      color: var(--text-soft);
      font-weight: 600;
    }

    input[type="number"],
    input[type="text"],
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 9px 10px;
      font-size: 0.94rem;
      outline: none;
      background: #fff;
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea {
      min-height: 125px;
      resize: vertical;
      font-family: "JetBrains Mono", Consolas, "Courier New", monospace;
      line-height: 1.45;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(29, 110, 242, 0.15);
    }

    input[type="checkbox"] {
      accent-color: var(--primary);
      width: 16px;
      height: 16px;
    }

    button {
      border: 0;
      border-radius: 9px;
      padding: 8px 12px;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: pointer;
      color: #fff;
      background: var(--primary);
      transition: transform 0.06s, opacity 0.2s, background 0.2s;
    }

    button:active {
      transform: translateY(1px);
    }

    button:hover {
      background: var(--primary-strong);
    }

    button.secondary {
      background: #62759e;
    }

    button.secondary:hover {
      background: #4f6288;
    }

    button.warn {
      background: #bc5b07;
    }

    button.warn:hover {
      background: #a14d04;
    }

    button.danger {
      background: var(--danger);
    }

    button.danger:hover {
      background: #a62133;
    }

    button.ghost {
      color: #3f5274;
      background: #ecf1fb;
    }

    button.ghost:hover {
      background: #dde8fb;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .tiny {
      font-size: 0.82rem;
      color: var(--text-soft);
      line-height: 1.38;
    }

    .mono {
      font-family: "JetBrains Mono", Consolas, "Courier New", monospace;
    }

    .log-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .log-toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .log-meta {
      font-size: 0.85rem;
      color: var(--text-soft);
    }

    .log-wrap {
      border-radius: 11px;
      border: 1px solid #263963;
      background: linear-gradient(180deg, #10182d, #0d1527);
      overflow: hidden;
      min-height: 460px;
      display: flex;
      flex-direction: column;
    }

    .log-head {
      font-family: "JetBrains Mono", Consolas, "Courier New", monospace;
      font-size: 0.8rem;
      color: #95aedf;
      background: #152241;
      padding: 8px 10px;
      border-bottom: 1px solid #243865;
    }

    .log-body {
      flex: 1;
      overflow: auto;
      font-family: "JetBrains Mono", Consolas, "Courier New", monospace;
      font-size: 0.86rem;
      line-height: 1.45;
      color: #d7e6ff;
      padding: 8px 10px;
    }

    .log-line {
      border-bottom: 1px dashed rgba(75, 97, 145, 0.35);
      padding: 5px 0;
      white-space: pre-wrap;
      word-break: break-word;
      animation: fade-in 0.2s ease;
    }

    .log-line:last-child {
      border-bottom: 0;
    }

    .log-line.rx {
      color: #9ad6ff;
    }

    .log-line.tx {
      color: #ffd39a;
    }

    .log-line.sys {
      color: #b6c4df;
    }

    .log-line.err {
      color: #ff9595;
    }

    progress {
      width: 100%;
      height: 11px;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid #d7dff0;
      background: #edf1f8;
    }

    progress::-webkit-progress-bar {
      background: #edf1f8;
    }

    progress::-webkit-progress-value {
      background: linear-gradient(90deg, #1d6ef2, #119868);
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(3px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1100px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .log-wrap {
        min-height: 360px;
      }
    }

    @media (max-width: 560px) {
      .shell {
        padding: 12px;
      }

      .hero {
        padding: 14px;
      }

      .grid-2 {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="hero">
      <h1>Web Serial 串口调试助手</h1>
      <p>支持串口透传调试：实时收发、HEX/字符串、循环发送、文件发送、日志保存，一页直接使用。</p>
      <div id="secureBanner" class="banner"></div>
    </header>

    <main class="layout">
      <section class="panel">
        <article class="card">
          <h2>
            串口连接
            <span id="connState" class="state-pill disconnected">未连接</span>
          </h2>

          <div class="row" style="margin-bottom: 8px;">
            <button id="requestPortBtn">选择串口</button>
            <button id="refreshPortsBtn" class="secondary">刷新列表</button>
          </div>

          <div class="field">
            <label for="portSelect">已授权端口</label>
            <select id="portSelect">
              <option value="">暂无已授权串口</option>
            </select>
          </div>

          <div class="row" style="margin-bottom: 8px;">
            <button id="connectBtn">连接</button>
            <button id="disconnectBtn" class="danger" disabled>断开</button>
          </div>

          <div class="grid-2">
            <div class="field">
              <label for="baudRate">波特率</label>
              <input id="baudRate" type="number" min="1" step="1" value="115200">
            </div>
            <div class="field">
              <label for="dataBits">数据位</label>
              <select id="dataBits">
                <option value="8" selected>8</option>
                <option value="7">7</option>
                <option value="6">6</option>
                <option value="5">5</option>
              </select>
            </div>
            <div class="field">
              <label for="stopBits">停止位</label>
              <select id="stopBits">
                <option value="1" selected>1</option>
                <option value="2">2</option>
              </select>
            </div>
            <div class="field">
              <label for="parity">校验位</label>
              <select id="parity">
                <option value="none" selected>none</option>
                <option value="even">even</option>
                <option value="odd">odd</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="flowControl">流控</label>
            <select id="flowControl">
              <option value="none" selected>none</option>
              <option value="hardware">hardware (RTS/CTS)</option>
            </select>
          </div>

          <p class="tiny">提示：串口选项会在连接时生效。若设备热插拔，可点击“刷新列表”重新识别。</p>
        </article>

        <article class="card">
          <h2>发送控制</h2>

          <div class="grid-2">
            <div class="field">
              <label for="txMode">发送模式</label>
              <select id="txMode">
                <option value="string" selected>字符串</option>
                <option value="hex">HEX</option>
              </select>
            </div>
            <div class="field">
              <label for="txLineEnding">自动换行</label>
              <select id="txLineEnding">
                <option value="">不追加</option>
                <option value="\n">LF (\n)</option>
                <option value="\r\n">CRLF (\r\n)</option>
                <option value="\r">CR (\r)</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="txInput">发送内容</label>
            <textarea id="txInput" placeholder="输入要发送的文本。Ctrl+Enter 可快速发送。"></textarea>
          </div>

          <div class="row" style="margin-bottom: 8px;">
            <button id="sendBtn" disabled>发送</button>
            <button id="clearInputBtn" class="ghost">清空输入</button>
          </div>

          <div class="grid-2">
            <div class="field">
              <label for="loopInterval">循环周期 (ms)</label>
              <input id="loopInterval" type="number" min="10" step="10" value="1000">
            </div>
            <div class="field">
              <label for="loopHint">循环控制</label>
              <div id="loopHint" class="row">
                <button id="startLoopBtn" class="warn" disabled>启动循环发送</button>
                <button id="stopLoopBtn" class="secondary" disabled>停止循环发送</button>
              </div>
            </div>
          </div>

          <p class="tiny">HEX 模式示例：<span class="mono">01 03 00 00 00 02 C4 0B</span>。支持空格、换行、逗号分隔。</p>
        </article>

        <article class="card">
          <h2>文件发送</h2>

          <div class="field">
            <label for="fileInput">选择文件</label>
            <input id="fileInput" type="file">
          </div>

          <div class="grid-2">
            <div class="field">
              <label for="fileChunkSize">分片大小 (字节)</label>
              <input id="fileChunkSize" type="number" min="1" step="1" value="512">
            </div>
            <div class="field">
              <label for="fileDelay">分片间隔 (ms)</label>
              <input id="fileDelay" type="number" min="0" step="1" value="0">
            </div>
          </div>

          <div class="row" style="margin-bottom: 8px;">
            <button id="sendFileBtn" disabled>开始发送文件</button>
            <button id="cancelFileBtn" class="danger" disabled>取消发送</button>
          </div>

          <div class="field">
            <label for="fileProgress">文件发送进度</label>
            <progress id="fileProgress" value="0" max="100"></progress>
            <div id="fileProgressText" class="tiny">0%</div>
          </div>
        </article>
      </section>

      <section class="panel">
        <article class="card">
          <h2>实时日志</h2>

          <div class="log-controls">
            <div class="log-toolbar">
              <label for="rxMode">接收显示</label>
              <select id="rxMode" style="width: 150px;">
                <option value="string" selected>字符串</option>
                <option value="hex">HEX</option>
                <option value="both">字符串 + HEX</option>
              </select>
              <label class="row" style="gap: 6px;">
                <input id="autoScroll" type="checkbox" checked>
                自动滚动
              </label>
            </div>

            <div class="log-toolbar">
              <button id="clearLogBtn" class="ghost">清空日志</button>
              <button id="saveLogBtn" class="secondary">保存日志</button>
            </div>
          </div>

          <div class="log-meta">日志条数：<span id="logCount">0</span></div>

          <div class="log-wrap">
            <div class="log-head">[时间] [方向] 内容</div>
            <div id="logBody" class="log-body"></div>
          </div>

          <p class="tiny">日志方向：RX=接收，TX=发送，SYS=系统信息，ERR=错误。日志保存在浏览器本地，不上传服务器。</p>
        </article>
      </section>
    </main>
  </div>

  <script>
    (() => {
      const app = {
        supported: "serial" in navigator,
        ports: [],
        activePort: null,
        reader: null,
        writer: null,
        readActive: false,
        loopEnabled: false,
        loopTimer: null,
        loopBusy: false,
        fileSending: false,
        abortFileSend: false,
        writeQueue: Promise.resolve(),
        logs: [],
        maxLogs: 5000,
        encoder: new TextEncoder(),
        decoder: new TextDecoder()
      };

      const el = {
        secureBanner: document.getElementById("secureBanner"),
        connState: document.getElementById("connState"),
        requestPortBtn: document.getElementById("requestPortBtn"),
        refreshPortsBtn: document.getElementById("refreshPortsBtn"),
        portSelect: document.getElementById("portSelect"),
        connectBtn: document.getElementById("connectBtn"),
        disconnectBtn: document.getElementById("disconnectBtn"),
        baudRate: document.getElementById("baudRate"),
        dataBits: document.getElementById("dataBits"),
        stopBits: document.getElementById("stopBits"),
        parity: document.getElementById("parity"),
        flowControl: document.getElementById("flowControl"),
        txMode: document.getElementById("txMode"),
        txLineEnding: document.getElementById("txLineEnding"),
        txInput: document.getElementById("txInput"),
        sendBtn: document.getElementById("sendBtn"),
        clearInputBtn: document.getElementById("clearInputBtn"),
        loopInterval: document.getElementById("loopInterval"),
        startLoopBtn: document.getElementById("startLoopBtn"),
        stopLoopBtn: document.getElementById("stopLoopBtn"),
        fileInput: document.getElementById("fileInput"),
        fileChunkSize: document.getElementById("fileChunkSize"),
        fileDelay: document.getElementById("fileDelay"),
        sendFileBtn: document.getElementById("sendFileBtn"),
        cancelFileBtn: document.getElementById("cancelFileBtn"),
        fileProgress: document.getElementById("fileProgress"),
        fileProgressText: document.getElementById("fileProgressText"),
        rxMode: document.getElementById("rxMode"),
        autoScroll: document.getElementById("autoScroll"),
        clearLogBtn: document.getElementById("clearLogBtn"),
        saveLogBtn: document.getElementById("saveLogBtn"),
        logCount: document.getElementById("logCount"),
        logBody: document.getElementById("logBody")
      };

      function isSecureReady() {
        return window.isSecureContext || location.hostname === "localhost" || location.hostname === "127.0.0.1";
      }

      function pad(num, len = 2) {
        return String(num).padStart(len, "0");
      }

      function formatTime(d = new Date()) {
        return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}.${pad(d.getMilliseconds(), 3)}`;
      }

      function updateLogCount() {
        el.logCount.textContent = String(app.logs.length);
      }

      function scrollLogToBottom() {
        if (el.autoScroll.checked) {
          el.logBody.scrollTop = el.logBody.scrollHeight;
        }
      }

      function addLog(type, message, cssClass = "sys") {
        const text = `[${formatTime()}] [${type}] ${message}`;
        app.logs.push(text);
        if (app.logs.length > app.maxLogs) {
          app.logs.shift();
          if (el.logBody.firstChild) {
            el.logBody.removeChild(el.logBody.firstChild);
          }
        }

        const line = document.createElement("div");
        line.className = `log-line ${cssClass}`;
        line.textContent = text;
        el.logBody.appendChild(line);

        updateLogCount();
        scrollLogToBottom();
      }

      function clearLogs() {
        app.logs = [];
        el.logBody.innerHTML = "";
        updateLogCount();
      }

      function setConnState(text, mode = "disconnected") {
        el.connState.textContent = text;
        el.connState.classList.remove("connected", "disconnected", "error");
        el.connState.classList.add(mode);
      }

      function getPortLabel(port, index) {
        const info = typeof port.getInfo === "function" ? port.getInfo() : {};
        const vid = typeof info.usbVendorId === "number" ? `0x${info.usbVendorId.toString(16).toUpperCase().padStart(4, "0")}` : "N/A";
        const pid = typeof info.usbProductId === "number" ? `0x${info.usbProductId.toString(16).toUpperCase().padStart(4, "0")}` : "N/A";
        return `串口 ${index + 1} (VID:${vid} PID:${pid})`;
      }

      function renderPortOptions(selectedPort = null) {
        el.portSelect.innerHTML = "";
        if (!app.ports.length) {
          const empty = document.createElement("option");
          empty.value = "";
          empty.textContent = "暂无已授权串口";
          el.portSelect.appendChild(empty);
          return;
        }

        app.ports.forEach((port, idx) => {
          const opt = document.createElement("option");
          opt.value = String(idx);
          opt.textContent = getPortLabel(port, idx);
          if (selectedPort && selectedPort === port) {
            opt.selected = true;
          }
          el.portSelect.appendChild(opt);
        });
      }

      function selectedPort() {
        const idx = Number(el.portSelect.value);
        if (Number.isInteger(idx) && idx >= 0 && idx < app.ports.length) {
          return app.ports[idx];
        }
        return null;
      }

      function updateControlState() {
        const connected = Boolean(app.activePort);
        const hasPort = app.ports.length > 0;
        const supported = app.supported;

        el.requestPortBtn.disabled = !supported;
        el.refreshPortsBtn.disabled = !supported;
        el.portSelect.disabled = !supported;
        el.connectBtn.disabled = !supported || connected || !hasPort;
        el.disconnectBtn.disabled = !supported || !connected;

        el.sendBtn.disabled = !connected;
        el.startLoopBtn.disabled = !connected || app.loopEnabled;
        el.stopLoopBtn.disabled = !connected || !app.loopEnabled;
        el.sendFileBtn.disabled = !connected || app.fileSending;
        el.cancelFileBtn.disabled = !app.fileSending;
      }

      function normalizeLineEnding(value) {
        if (value === "\\n") {
          return "\n";
        }
        if (value === "\\r") {
          return "\r";
        }
        if (value === "\\r\\n") {
          return "\r\n";
        }
        return value;
      }

      function escapeControlChars(str) {
        return str
          .replace(/\r/g, "\\r")
          .replace(/\n/g, "\\n")
          .replace(/\t/g, "\\t");
      }

      function bytesToHex(bytes) {
        return Array.from(bytes, (b) => b.toString(16).toUpperCase().padStart(2, "0")).join(" ");
      }

      function parseHexInput(hexText) {
        const stripped = hexText
          .replace(/0x/gi, "")
          .replace(/[\s,，;；|]+/g, "")
          .trim();

        if (!stripped) {
          return new Uint8Array(0);
        }
        if (!/^[\da-fA-F]+$/.test(stripped)) {
          throw new Error("HEX 输入包含非法字符，请仅使用 0-9/A-F。");
        }
        if (stripped.length % 2 !== 0) {
          throw new Error("HEX 输入长度必须为偶数。");
        }

        const out = new Uint8Array(stripped.length / 2);
        for (let i = 0; i < stripped.length; i += 2) {
          out[i / 2] = Number.parseInt(stripped.slice(i, i + 2), 16);
        }
        return out;
      }

      function concatBytes(a, b) {
        if (!a.length) {
          return b;
        }
        if (!b.length) {
          return a;
        }
        const out = new Uint8Array(a.length + b.length);
        out.set(a, 0);
        out.set(b, a.length);
        return out;
      }

      function serializeTxPreview(mode, rawInput, lineEnding, bytes) {
        if (mode === "string") {
          return `字符串: "${escapeControlChars(rawInput + lineEnding)}"`;
        }
        return `HEX: ${bytesToHex(bytes)}`;
      }

      async function queueWrite(bytes) {
        app.writeQueue = app.writeQueue
          .catch(() => undefined)
          .then(async () => {
            if (!app.writer) {
              throw new Error("串口写入器不可用，请重新连接。");
            }
            await app.writer.write(bytes);
          });
        return app.writeQueue;
      }

      async function refreshPorts(log = true) {
        if (!app.supported) {
          return;
        }
        try {
          app.ports = await navigator.serial.getPorts();
          renderPortOptions(app.activePort);
          updateControlState();
          if (log) {
            addLog("SYS", `端口列表已刷新，当前可用 ${app.ports.length} 个授权端口。`, "sys");
          }
        } catch (err) {
          addLog("ERR", `刷新端口失败：${err.message}`, "err");
        }
      }

      async function requestPort() {
        if (!app.supported) {
          return;
        }
        try {
          const port = await navigator.serial.requestPort();
          if (!app.ports.includes(port)) {
            app.ports.push(port);
          }
          renderPortOptions(port);
          updateControlState();
          addLog("SYS", `已授权新串口：${getPortLabel(port, app.ports.indexOf(port))}`, "sys");
        } catch (err) {
          if (err && err.name === "NotFoundError") {
            addLog("SYS", "用户取消了串口选择。", "sys");
            return;
          }
          addLog("ERR", `获取串口权限失败：${err.message}`, "err");
        }
      }

      async function connectPort() {
        if (!app.supported) {
          addLog("ERR", "当前浏览器不支持 Web Serial API。", "err");
          return;
        }
        if (app.activePort) {
          addLog("SYS", "串口已处于连接状态。", "sys");
          return;
        }

        const port = selectedPort();
        if (!port) {
          addLog("ERR", "请先选择一个已授权串口。", "err");
          return;
        }

        const options = {
          baudRate: Math.max(1, Number.parseInt(el.baudRate.value, 10) || 115200),
          dataBits: Number.parseInt(el.dataBits.value, 10) || 8,
          stopBits: Number.parseInt(el.stopBits.value, 10) || 1,
          parity: el.parity.value || "none",
          flowControl: el.flowControl.value || "none"
        };

        try {
          await port.open(options);
          app.activePort = port;
          app.writer = port.writable.getWriter();
          app.writeQueue = Promise.resolve();
          app.decoder = new TextDecoder();
          setConnState("已连接", "connected");
          addLog("SYS", `串口已连接，参数：${JSON.stringify(options)}`, "sys");
          updateControlState();
          startReadLoop();
        } catch (err) {
          setConnState("连接失败", "error");
          addLog("ERR", `连接失败：${err.message}`, "err");
          updateControlState();
        }
      }

      async function cleanupConnection() {
        app.readActive = false;
        stopLoopSend(false);

        if (app.fileSending) {
          app.abortFileSend = true;
        }

        if (app.reader) {
          try {
            await app.reader.cancel();
          } catch (_) {
          }
          try {
            app.reader.releaseLock();
          } catch (_) {
          }
          app.reader = null;
        }

        if (app.writer) {
          try {
            app.writer.releaseLock();
          } catch (_) {
          }
          app.writer = null;
        }

        if (app.activePort) {
          try {
            await app.activePort.close();
          } catch (_) {
          }
          app.activePort = null;
        }

        app.decoder = new TextDecoder();
        app.writeQueue = Promise.resolve();
        setConnState("未连接", "disconnected");
        updateControlState();
      }

      async function disconnectPort(log = true) {
        await cleanupConnection();
        if (log) {
          addLog("SYS", "串口已断开。", "sys");
        }
      }

      async function startReadLoop() {
        if (!app.activePort || !app.activePort.readable) {
          return;
        }

        app.readActive = true;
        try {
          app.reader = app.activePort.readable.getReader();
          while (app.readActive) {
            const { value, done } = await app.reader.read();
            if (done) {
              break;
            }
            if (value && value.length) {
              onIncomingData(value);
            }
          }
        } catch (err) {
          if (app.readActive) {
            addLog("ERR", `串口读取异常：${err.message}`, "err");
          }
        } finally {
          if (app.reader) {
            try {
              app.reader.releaseLock();
            } catch (_) {
            }
            app.reader = null;
          }
        }
      }

      function onIncomingData(bytes) {
        const mode = el.rxMode.value;
        const text = app.decoder.decode(bytes, { stream: true });
        const textPart = text ? escapeControlChars(text) : "(空文本)";
        const hexPart = bytesToHex(bytes);

        if (mode === "string") {
          addLog("RX", textPart, "rx");
          return;
        }
        if (mode === "hex") {
          addLog("RX", hexPart || "(空数据)", "rx");
          return;
        }
        addLog("RX", `TXT: ${textPart} | HEX: ${hexPart || "(空数据)"}`, "rx");
      }

      function buildPayloadFromInput() {
        const mode = el.txMode.value;
        const raw = el.txInput.value || "";
        const lineEnding = normalizeLineEnding(el.txLineEnding.value || "");
        const endingBytes = app.encoder.encode(lineEnding);

        if (mode === "string") {
          const content = raw + lineEnding;
          if (!content.length) {
            throw new Error("发送内容为空。");
          }
          return {
            bytes: app.encoder.encode(content),
            preview: serializeTxPreview("string", raw, lineEnding, new Uint8Array(0))
          };
        }

        const dataBytes = parseHexInput(raw);
        const bytes = concatBytes(dataBytes, endingBytes);
        if (!bytes.length) {
          throw new Error("HEX 输入为空。");
        }
        return {
          bytes,
          preview: serializeTxPreview("hex", raw, lineEnding, bytes)
        };
      }

      async function sendInput(source = "手动") {
        if (!app.activePort || !app.writer) {
          addLog("ERR", "串口未连接，无法发送。", "err");
          return false;
        }

        try {
          const payload = buildPayloadFromInput();
          await queueWrite(payload.bytes);
          addLog("TX", `${source}发送，${payload.preview}`, "tx");
          return true;
        } catch (err) {
          addLog("ERR", `${source}发送失败：${err.message}`, "err");
          return false;
        }
      }

      function stopLoopSend(log = true) {
        app.loopEnabled = false;
        app.loopBusy = false;
        if (app.loopTimer) {
          clearTimeout(app.loopTimer);
          app.loopTimer = null;
        }
        updateControlState();
        if (log) {
          addLog("SYS", "循环发送已停止。", "sys");
        }
      }

      function startLoopSend() {
        if (app.loopEnabled) {
          return;
        }
        if (!app.activePort) {
          addLog("ERR", "请先连接串口再启动循环发送。", "err");
          return;
        }

        const interval = Math.max(10, Number.parseInt(el.loopInterval.value, 10) || 1000);
        app.loopEnabled = true;
        app.loopBusy = false;
        updateControlState();
        addLog("SYS", `循环发送已启动，间隔 ${interval}ms。`, "sys");

        const tick = async () => {
          if (!app.loopEnabled) {
            return;
          }
          if (!app.activePort) {
            stopLoopSend(true);
            return;
          }
          if (!app.loopBusy) {
            app.loopBusy = true;
            await sendInput("循环");
            app.loopBusy = false;
          }
          app.loopTimer = setTimeout(tick, interval);
        };

        tick();
      }

      function resetFileProgress() {
        el.fileProgress.value = 0;
        el.fileProgressText.textContent = "0%";
      }

      function updateFileProgress(sent, total) {
        const percent = total === 0 ? 0 : Math.min(100, Math.floor((sent / total) * 100));
        el.fileProgress.value = percent;
        el.fileProgressText.textContent = `${percent}% (${sent}/${total} 字节)`;
      }

      async function sendFile() {
        if (!app.activePort || !app.writer) {
          addLog("ERR", "串口未连接，无法发送文件。", "err");
          return;
        }

        const file = el.fileInput.files && el.fileInput.files[0];
        if (!file) {
          addLog("ERR", "请先选择要发送的文件。", "err");
          return;
        }

        const chunkSize = Math.max(1, Number.parseInt(el.fileChunkSize.value, 10) || 512);
        const delay = Math.max(0, Number.parseInt(el.fileDelay.value, 10) || 0);

        app.fileSending = true;
        app.abortFileSend = false;
        updateControlState();
        resetFileProgress();

        try {
          const buf = new Uint8Array(await file.arrayBuffer());
          if (!buf.length) {
            throw new Error("文件为空，无法发送。");
          }

          addLog("SYS", `开始发送文件：${file.name}，总大小 ${buf.length} 字节，分片 ${chunkSize} 字节。`, "sys");

          let sent = 0;
          while (sent < buf.length) {
            if (app.abortFileSend) {
              addLog("SYS", "文件发送已取消。", "sys");
              break;
            }
            const end = Math.min(sent + chunkSize, buf.length);
            const chunk = buf.slice(sent, end);
            await queueWrite(chunk);
            sent = end;
            updateFileProgress(sent, buf.length);
            if (delay > 0) {
              await new Promise((resolve) => setTimeout(resolve, delay));
            }
          }

          if (!app.abortFileSend) {
            addLog("TX", `文件发送完成：${file.name} (${buf.length} 字节)`, "tx");
          }
        } catch (err) {
          addLog("ERR", `文件发送失败：${err.message}`, "err");
        } finally {
          app.fileSending = false;
          app.abortFileSend = false;
          updateControlState();
        }
      }

      function cancelFileSend() {
        if (!app.fileSending) {
          return;
        }
        app.abortFileSend = true;
      }

      function saveLogs() {
        if (!app.logs.length) {
          addLog("SYS", "当前无日志可保存。", "sys");
          return;
        }

        const now = new Date();
        const fileName = `serial-log-${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}.txt`;
        const blob = new Blob([app.logs.join("\r\n")], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = fileName;
        a.click();
        URL.revokeObjectURL(url);
        addLog("SYS", `日志已保存：${fileName}`, "sys");
      }

      function onTxModeChange() {
        if (el.txMode.value === "hex") {
          el.txInput.placeholder = "输入 HEX 数据，例如：01 03 00 00 00 02 C4 0B";
        } else {
          el.txInput.placeholder = "输入要发送的文本。Ctrl+Enter 可快速发送。";
        }
      }

      function bindEvents() {
        el.requestPortBtn.addEventListener("click", requestPort);
        el.refreshPortsBtn.addEventListener("click", () => refreshPorts(true));
        el.connectBtn.addEventListener("click", connectPort);
        el.disconnectBtn.addEventListener("click", () => disconnectPort(true));

        el.sendBtn.addEventListener("click", () => sendInput("手动"));
        el.clearInputBtn.addEventListener("click", () => {
          el.txInput.value = "";
        });

        el.startLoopBtn.addEventListener("click", startLoopSend);
        el.stopLoopBtn.addEventListener("click", () => stopLoopSend(true));

        el.sendFileBtn.addEventListener("click", sendFile);
        el.cancelFileBtn.addEventListener("click", cancelFileSend);

        el.clearLogBtn.addEventListener("click", () => {
          clearLogs();
          addLog("SYS", "日志已清空。", "sys");
        });
        el.saveLogBtn.addEventListener("click", saveLogs);

        el.txMode.addEventListener("change", onTxModeChange);
        el.txInput.addEventListener("keydown", (evt) => {
          if (evt.key === "Enter" && (evt.ctrlKey || evt.metaKey)) {
            evt.preventDefault();
            sendInput("快捷键");
          }
        });

        if (app.supported) {
          navigator.serial.addEventListener("connect", async () => {
            addLog("SYS", "检测到新串口设备接入。", "sys");
            await refreshPorts(false);
          });

          navigator.serial.addEventListener("disconnect", async (evt) => {
            const disconnectedPort = evt.target;
            const activeLost = app.activePort && disconnectedPort === app.activePort;
            await refreshPorts(false);
            if (activeLost) {
              addLog("ERR", "当前连接串口已断开。", "err");
              await disconnectPort(false);
            } else {
              addLog("SYS", "检测到串口设备已断开。", "sys");
            }
          });
        }
      }

      function init() {
        bindEvents();
        onTxModeChange();
        resetFileProgress();

        if (!app.supported) {
          setConnState("浏览器不支持", "error");
          addLog("ERR", "当前浏览器不支持 Web Serial API。请使用新版 Chrome / Edge。", "err");
        } else {
          setConnState("未连接", "disconnected");
          addLog("SYS", "应用已启动，请先点击“选择串口”。", "sys");
          refreshPorts(false);
        }

        if (!isSecureReady()) {
          el.secureBanner.style.display = "block";
          el.secureBanner.textContent = "注意：Web Serial API 需要 HTTPS 或 localhost。请将本页面部署到 HTTPS 站点后使用。";
        }

        updateControlState();
      }

      init();
    })();
  </script>
</body>
</html>
